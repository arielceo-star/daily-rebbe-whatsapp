name: Daily Rebbe WhatsApp

on:
  schedule:
    # Times are UTC. Israel is UTC+3 in summer / UTC+2 in winter.
    # GitHub cron often fires 1-3h late; the 08:00 zugiyut is triggered
    # externally by cron-job.org (workflow_dispatch, no inputs -> 'auto').
    - cron: '0 4 * * 0-5'   # Letter, morning ~07:00 IL, Sunday-Friday
    - cron: '0 17 * * 0-4'  # Letter, evening ~20:00 IL, Sunday-Thursday
    - cron: '0 18 * * 6'    # Zugiyut, Motzaei Shabbat ~21:00 IL ("Shavua Tov" opening)
  workflow_dispatch:
    inputs:
      message_type:
        description: 'Which message to send (auto = 08:00 zugiyut slot, skips Shabbat)'
        type: choice
        options:
          - auto
          - letter
          - zugiyut
        default: auto

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Send message
        env:
          MESSAGE_TYPE: ${{ github.event.inputs.message_type || (github.event.schedule == '0 18 * * 6' && 'zugiyut' || 'letter') }}
          GREEN_API_INSTANCE: ${{ secrets.GREEN_API_INSTANCE }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          GREEN_API_URL: ${{ secrets.GREEN_API_URL }}
          WHATSAPP_PHONES: ${{ secrets.WHATSAPP_PHONES }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
        run: python send_message.py
