name: Daily Rebbe WhatsApp

on:
  schedule:
    - cron: '0 9 * * 0-5'
    - cron: '0 18 * * 6'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic requests

      - name: Send message
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GREEN_API_INSTANCE: ${{ secrets.GREEN_API_INSTANCE }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          GREEN_API_URL: ${{ secrets.GREEN_API_URL }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
        run: python send_message.py
