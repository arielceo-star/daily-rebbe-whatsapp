name: Daily Rebbe WhatsApp

on:
  schedule:
    # Times are UTC. Israel is UTC+3 in summer / UTC+2 in winter.
    - cron: '0 4 * * 0-5'   # Morning ~07:00 IL, Sunday-Friday
    - cron: '0 17 * * 0-4'  # Evening ~20:00 IL, Sunday-Thursday
    - cron: '0 18 * * 6'    # Motzaei Shabbat ~21:00 IL (no sends on Shabbat)
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Send message
        env:
          GREEN_API_INSTANCE: ${{ secrets.GREEN_API_INSTANCE }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          GREEN_API_URL: ${{ secrets.GREEN_API_URL }}
          WHATSAPP_PHONES: ${{ secrets.WHATSAPP_PHONES }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
        run: python send_message.py
